services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-db}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-db}?schema=public
      JWT_SECRET:   ${JWT_SECRET}
      PORT:         3005
      NODE_ENV:     production
      MAIL_HOST:    ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:    ${MAIL_PORT:-587}
      MAIL_USER:    ${MAIL_USER}
      MAIL_PASS:    ${MAIL_PASS}
      MAIL_FROM:    ${MAIL_FROM}
    expose:
      - "3005"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
